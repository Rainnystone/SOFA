name: CI

# Cross-platform continuous integration for SOFA.
# Runs the deterministic test suite and bytecode compilation on
# ubuntu, macOS, and Windows so Windows stays a first-class runtime.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Bytecode-compile scripts and tests
        run: python -m compileall -q scripts tests

      - name: Run unit tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m unittest discover -s tests -p 'test_*.py'
